<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài Liệu Miễn Phí - Ngoại Ngữ Phương Thảo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary: #d32f2f;
            --primary-dark: #9a0007;
            --secondary: #002e5b;
            --accent: #ffb300;
            --white: #ffffff;
            --black: #1a1a1a;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-600: #6c757d;
            --gray-800: #343a40;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--gray-100);
            min-height: 100vh;
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 250px;
            background: var(--secondary);
            color: white;
            padding: 20px 0;
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .sidebar-header h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            font-weight: 700;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sidebar-menu {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 0 10px;
        }

        .menu-item {
            padding: 15px 20px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
            border: none;
            background: none;
            font-size: 15px;
            font-weight: 500;
            width: 100%;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .menu-item.active {
            background: var(--primary);
            color: white;
            font-weight: 600;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 2px solid rgba(255, 255, 255, 0.1);
        }

        .logout-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .logout-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(211, 47, 47, 0.3);
        }

        /* MAIN CONTENT */
        .main-content {
            margin-left: 250px;
            flex: 1;
            padding: 30px;
        }

        .content-header {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            color: var(--secondary);
            margin: 0;
        }

        .user-info {
            text-align: right;
        }

        .user-info p {
            margin: 0;
            color: var(--gray-600);
            font-size: 14px;
        }

        .user-name {
            font-weight: 700;
            color: var(--secondary);
            font-size: 16px;
        }

        /* DOCUMENTS SECTION */
        .documents-section h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            color: var(--secondary);
            margin-bottom: 20px;
            font-weight: 700;
        }

        .documents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .document-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .document-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }

        .document-icon {
            width: 100%;
            height: 120px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
        }

        .document-info {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .document-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 12px;
            word-break: break-word;
        }

        .document-download {
            padding: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-align: center;
            text-decoration: none;
            display: block;
        }

        .document-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(211, 47, 47, 0.3);
        }

        .empty-state {
            background: white;
            padding: 60px 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-family: 'Montserrat', sans-serif;
            font-size: 22px;
            color: var(--secondary);
            margin-bottom: 10px;
        }

        .empty-state p {
            color: var(--gray-600);
            margin: 0;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }

            .main-content {
                margin-left: 200px;
                padding: 20px;
            }

            .content-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .content-header h1 {
                font-size: 26px;
            }

            .documents-grid {
                grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            }
        }

        @media (max-width: 480px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 15px;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            }

            .sidebar-header {
                padding: 0;
                border: none;
                margin: 0;
                flex: 1;
            }

            .sidebar-header h2 {
                font-size: 16px;
            }

            .sidebar-menu {
                display: none;
            }

            .sidebar-footer {
                padding: 0;
                border: none;
            }

            .logout-btn {
                padding: 8px 15px;
                font-size: 12px;
                width: auto;
            }

            .main-content {
                margin-left: 0;
                padding: 15px;
            }

            .content-header h1 {
                font-size: 22px;
            }

            .documents-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>📚 Học Tập</h2>
        </div>

        <nav class="sidebar-menu">
            <a href="learning.html" class="menu-item" onclick="navigateTo('dashboard')">
                <span>🎓</span> Học Trực Tuyến
            </a>
            <a href="#" class="menu-item" onclick="navigateTo('mycourses')">
                <span>📖</span> Khóa Học Của Tôi
            </a>
            <a href="documents.html" class="menu-item active">
                <span>📄</span> Tài Liệu Miễn Phí
            </a>
            <a href="#" class="menu-item" onclick="navigateTo('support')">
                <span>💬</span> Hỗ Trợ Học Tập
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="logout-btn" onclick="logout()">Đăng Xuất</button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <div class="content-header">
            <h1>📄 Tài Liệu Miễn Phí</h1>
            <div class="user-info">
                <p>Đã đăng nhập lúc <span id="currentTime"></span></p>
                <p class="user-name" id="usernameDisplay">hocvien</p>
            </div>
        </div>

        <!-- DOCUMENTS SECTION -->
        <section class="documents-section">
            <h2>📚 Kho Tài Liệu</h2>
            <div class="documents-grid" id="documentsGrid">
                <!-- Documents will be loaded here -->
            </div>
        </section>
    </main>

    <script>
        // ============= KIỂM TRA BẢO MẬT =============
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = '/login';
        }

        // ============= DANH SÁCH TÀI LIỆU PDF (JSON) =============
        // Dễ dàng thêm tài liệu mới bằng cách thêm object vào mảng
        const documentsList = [
            {
                id: 1,
                name: "Hướng Dẫn Giới Thiệu Tiếng Anh",
                filename: "tieng-anh-co-ban.pdf",
                url: "/documents/tieng-anh-co-ban.pdf"
            },
            {
                id: 2,
                name: "Ngữ Pháp Tiếng Anh Level A1",
                filename: "ngu-phap-a1.pdf",
                url: "/documents/ngu-phap-a1.pdf"
            },
            {
                id: 3,
                name: "Bài Tập Phát Âm Chuẩn",
                filename: "bai-tap-phat-am.pdf",
                url: "/documents/bai-tap-phat-am.pdf"
            },
            {
                id: 4,
                name: "Từ Vựng Giao Tiếp Hàng Ngày",
                filename: "tu-vung-giao-tiep.pdf",
                url: "/documents/tu-vung-giao-tiep.pdf"
            },
            {
                id: 5,
                name: "Ôn Tập Toeic Phần Listening",
                filename: "on-tap-toeic-listening.pdf",
                url: "/documents/on-tap-toeic-listening.pdf"
            },
            {
                id: 6,
                name: "Kỹ Năng Viết Email Tiếng Anh",
                filename: "ky-nang-viet-email.pdf",
                url: "/documents/ky-nang-viet-email.pdf"
            }
        ];

        // ============= HIỂN THỊ DANH SÁCH TÀI LIỆU =============
        document.addEventListener('DOMContentLoaded', function() {
            const username = localStorage.getItem('username') || 'Học viên';
            document.getElementById('usernameDisplay').textContent = username;
            updateTime();
            loadDocuments();
        });

        // ============= HÀM TẢI DANH SÁCH TÀI LIỆU =============
        function loadDocuments() {
            const grid = document.getElementById('documentsGrid');
            grid.innerHTML = '';

            if (documentsList.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1 / -1;">
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <h3>Chưa Có Tài Liệu</h3>
                            <p>Các tài liệu sẽ sớm được thêm vào. Vui lòng quay lại sau!</p>
                        </div>
                    </div>
                `;
                return;
            }

            documentsList.forEach(doc => {
                const card = document.createElement('div');
                card.className = 'document-card';
                card.innerHTML = `
                    <div class="document-icon">📕</div>
                    <div class="document-info">
                        <div class="document-name">${doc.name}</div>
                        <a href="${doc.url}" download="${doc.filename}" class="document-download">
                            ⬇️ Tải Xuống
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // ============= HÀM CẬP NHẬT THỜI GIAN =============
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('vi-VN', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            const currentTimeEl = document.getElementById('currentTime');
            if (currentTimeEl) {
                currentTimeEl.textContent = timeString;
            }
        }

        // ============= HÀM ĐIỀU HƯỚNG =============
        function navigateTo(page) {
            if (page === 'dashboard') {
                window.location.href = 'learning.html';
            } else if (page === 'mycourses') {
                // Chuyển tới learning.html với tham số mycourses
                window.location.href = 'learning.html?page=mycourses';
            } else if (page === 'support') {
                window.location.href = 'learning.html?page=support';
            }
        }

        // ============= HÀM ĐĂNG XUẤT =============
        function logout() {
            if (confirm('Bạn có chắc muốn đăng xuất không?')) {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('username');
                localStorage.removeItem('studentCode');
                window.location.href = '/login';
            }
        }
    </script>
</body>
</html>
