<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Ngoại Ngữ Phương Thảo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary: #d32f2f;
            --primary-dark: #9a0007;
            --secondary: #002e5b;
            --accent: #ffb300;
            --white: #ffffff;
            --black: #1a1a1a;
            --gray-100: #f8f9fa;
            --gray-300: #dee2e6;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background: linear-gradient(135deg, var(--secondary) 0%, #00508f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: var(--white);
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .login-logo img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: contain;
        }

        .login-header h1 {
            font-family: var(--font-heading);
            font-size: 28px;
            color: var(--secondary);
            margin-bottom: 5px;
            font-weight: 700;
        }

        .login-header p {
            font-size: 14px;
            color: var(--gray-600);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }

        .divider {
            height: 3px;
            width: 60px;
            background: var(--primary);
            margin: 15px auto;
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--secondary);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--gray-300);
            border-radius: 8px;
            font-size: 16px;
            font-family: var(--font-main);
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.1);
        }

        .error-message {
            color: var(--primary);
            font-size: 14px;
            margin-top: 10px;
            padding: 10px;
            background: rgba(211, 47, 47, 0.1);
            border-radius: 5px;
            border-left: 3px solid var(--primary);
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
            min-height: 44px;
        }

        .login-button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(211, 47, 47, 0.3);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-footer {
            margin-top: 25px;
            text-align: center;
            font-size: 14px;
        }

        .login-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            margin: 0 5px;
        }

        .login-footer a:hover {
            text-decoration: underline;
            color: var(--primary-dark);
        }

        .login-footer p {
            margin-bottom: 10px;
            color: var(--gray-600);
        }

        .demo-info {
            margin-top: 20px;
            padding: 12px;
            background: var(--gray-100);
            border-radius: 8px;
            font-size: 13px;
            color: var(--gray-800);
            border-left: 3px solid var(--accent);
        }

        .demo-info strong {
            color: var(--secondary);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">
                <img src="LOGO.png" alt="Logo Ngoại Ngữ Phương Thảo">
            </div>
            <h1>Ngoại Ngữ Phương Thảo</h1>
            <p>Hệ thống học tập trực tuyến</p>
            <div class="divider"></div>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Tài khoản hoặc Email</label>
                <input type="text" id="username" name="username" placeholder="Nhập tài khoản hoặc email..." required>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu..." required>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <button type="submit" class="login-button">Đăng Nhập</button>
        </form>

        <div class="demo-info">
            <strong>👤 Tài khoản demo:</strong><br>
            Username: <strong>hocvien</strong><br>
            Password: <strong>123456</strong>
        </div>

        <div class="login-footer">
            <p>
                <a href="#">Quên mật khẩu?</a>
            </p>
            <p>
                Chưa có tài khoản?
                <a href="/">Đăng ký ngay</a>
            </p>
        </div>
    </div>

    <script>
        // Xử lý sự kiện submit form đăng nhập
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            // Kiểm tra thông tin (tạm dùng client-side, có thể sử dụng API sau)
            if (username === 'ngochang' && password === '123456') {
                // Đăng nhập thành công
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('username', username);
                // Chuyển hướng tới trang học tập
                window.location.href = '/learning';
            } else {
                // Đăng nhập thất bại - hiển thị lỗi
                errorMessage.textContent = '❌ Sai tài khoản hoặc mật khẩu!';
                errorMessage.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();
            }
        });

        // Ẩn thông báo lỗi khi người dùng bắt đầu nhập lại
        [usernameInput, passwordInput].forEach(input => {
            input.addEventListener('focus', function() {
                errorMessage.classList.remove('show');
            });
        });
    </script>
</body>
</html>
